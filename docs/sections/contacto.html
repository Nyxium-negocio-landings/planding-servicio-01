<section class="py-24 bg-background-light dark:bg-background-dark" id="contacto">
  <div class="max-w-4xl mx-auto px-6">
    <div class="bg-white dark:bg-slate-800 rounded-3xl shadow-xl overflow-hidden flex flex-col md:flex-row">
      <div class="md:w-1/3 bg-primary p-10 text-white">
        <h3 class="text-2xl font-bold mb-6">Cuéntanos tu caso</h3>
        <p class="text-white/80 text-sm mb-10 leading-relaxed">Estamos aquí para escucharte sin juicios. Completa el formulario y nos pondremos en contacto contigo lo antes posible.</p>
        <div class="space-y-6">
          <div class="flex items-center gap-4"><span class="material-symbols-outlined">mail</span><span class="text-sm">hola@mindpaz.com</span></div>
          <div class="flex items-center gap-4"><span class="material-symbols-outlined">call</span><span class="text-sm">+34 900 000 000</span></div>
          <div class="flex items-center gap-4"><span class="material-symbols-outlined">location_on</span><span class="text-sm" data-location="Madrid, Spain">Madrid, España</span></div>
        </div>
      </div>
      <div class="md:w-2/3 p-10">
        <form action="#" class="grid grid-cols-1 gap-6" method="POST">
          <div>
            <label class="block text-sm font-bold text-slate-700 dark:text-slate-300 mb-2">Nombre completo</label>
            <input class="w-full rounded-xl border-slate-200 dark:border-slate-700 dark:bg-slate-900 focus:border-primary focus:ring-primary" placeholder="Ej. Juan Pérez" type="text" />
          </div>
          <div>
            <label class="block text-sm font-bold text-slate-700 dark:text-slate-300 mb-2">Correo electrónico</label>
            <input class="w-full rounded-xl border-slate-200 dark:border-slate-700 dark:bg-slate-900 focus:border-primary focus:ring-primary" placeholder="juan@ejemplo.com" type="email" />
          </div>
          <div>
            <label class="block text-sm font-bold text-slate-700 dark:text-slate-300 mb-2">Servicio de interés</label>
            <select class="w-full rounded-xl border-slate-200 dark:border-slate-700 dark:bg-slate-900 focus:border-primary focus:ring-primary">
              <option>Ansiedad y Estrés</option>
              <option>Burnout Laboral</option>
              <option>Problemas de Pareja</option>
              <option>Terapia de Duelo</option>
              <option>Otro motivo</option>
            </select>
          </div>
          <div>
            <label class="block text-sm font-bold text-slate-700 dark:text-slate-300 mb-2">Mensaje breve (opcional)</label>
            <textarea class="w-full rounded-xl border-slate-200 dark:border-slate-700 dark:bg-slate-900 focus:border-primary focus:ring-primary" placeholder="¿Cómo podemos ayudarte?" rows="3"></textarea>
          </div>
          <button class="w-full py-4 bg-primary text-white font-bold rounded-xl hover:bg-primary/90 transition-all shadow-lg" type="submit">Enviar solicitud</button>
          <p class="text-[10px] text-slate-400 text-center">Tus datos están protegidos por el secreto profesional y la LOPD.</p>
        </form>
      </div>
    </div>
  </div>
</section>
