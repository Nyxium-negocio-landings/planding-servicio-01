<!doctype html>

<html class="light" lang="es">
  <head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>MindPaz - Servicios Psicológicos Profesionales</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600;700;800&amp;display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
      rel="stylesheet"
    />
    <script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              primary: "#137fec",
              "background-light": "#f6f7f8",
              "background-dark": "#101922",
            },
            fontFamily: {
              display: ["Manrope"],
            },
            borderRadius: {
              DEFAULT: "0.25rem",
              lg: "0.5rem",
              xl: "0.75rem",
              full: "9999px",
            },
          },
        },
      };
    </script>
  </head>
  <body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 antialiased">
    <div id="app" class="relative flex min-h-screen w-full flex-col overflow-x-hidden">
      <!-- Sections will be loaded dynamically from /sections/ -->
    </div>

    <script>
      (async function(){
        const parts = [
          'sections/header.html',
          'sections/hero.html',
          'sections/metodo.html',
          'sections/testimonios.html',
          'sections/precios.html',
          'sections/contacto.html',
          'sections/faq.html',
          'sections/cta.html',
          'sections/footer.html'
        ];
        const app = document.getElementById('app');
        try{
          for (const p of parts){
            const res = await fetch(p);
            if(!res.ok){ console.warn('Failed to load', p); continue; }
            const html = await res.text();
            if(p === 'sections/header.html' || p === 'sections/footer.html'){
              app.insertAdjacentHTML('beforeend', html);
            } else if(p === 'sections/hero.html'){
              app.insertAdjacentHTML('beforeend', '<main class="flex-1">' + html);
            } else if(p === 'sections/cta.html'){
              app.insertAdjacentHTML('beforeend', html + '</main>');
            } else {
              app.insertAdjacentHTML('beforeend', html);
            }
          }
        }catch(e){
          console.error(e);
          app.insertAdjacentHTML('beforeend', '<div style="padding:20px;color:#b91c1c">Error cargando secciones.</div>');
        }
      })();
    </script>
  </body>
</html>
